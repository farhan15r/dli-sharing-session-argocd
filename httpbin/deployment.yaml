apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
spec:
  replicas: 5
  selector:
    matchLabels:
      app: httpbin
      version: v1
  template:
    metadata:
      labels:
        app: httpbin
        version: v1
    spec:
      containers:
        - image: docker.io/mccutchen/go-httpbin:v2.15.0
          imagePullPolicy: IfNotPresent
          name: httpbin
          ports:
            - containerPort: 8080
          env:
            - name: PREFIX
              value: /httpbin
            - name: TZ
              value: Asia/Jakarta

